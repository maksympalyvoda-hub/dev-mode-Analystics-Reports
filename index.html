function ocExportCSV(){
  const data=ocGetData();

    header=`"#","${isOutlets?'Outlet':'Brand'}","Cancel %","Defects %","Prep Time (min)","WTM (min)","Delays %","Status"`;

  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`outlet_comparison_${ocSt.tab}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

function iaGetStatus(item){
  if(item.rate>=65)return{key:'top',lbl:'Top Seller'};
  if(item.rate>=45)return{key:'std',lbl:'Standard'};
  if(item.rate>=25)return{key:'lconv',lbl:'Low Conversion'};
  if(item.imp>6000)return{key:'lvis',lbl:'Low Visibility'};
  return{key:'under',lbl:'Underperforming'};
}

function iaSparkline(trend,statusKey){
  const h=28,w=72,pad=2,bw=4,gap=2;
  const max=Math.max(...trend)||1;
  const isGood=statusKey==='top'||statusKey==='std';
  const colGood='#008470',colBad='#E05555',colMid='#C8CDD0';
  const colors=trend.map((_,i)=>{
    if(statusKey==='top')return i>=trend.length-4?colGood:colMid;
    if(statusKey==='std')return colMid;
    if(statusKey==='lconv')return i<=3?colMid:colBad;
    return i<=2?colMid:colBad;
  });
  const bars=trend.map((v,i)=>{
    const bh=Math.max(3,Math.round(((v/max)*(h-pad*2))));
    const x=pad+i*(bw+gap);
    const y=h-pad-bh;
    const isDash=statusKey==='lconv'||statusKey==='under'||statusKey==='lvis';
    if(isDash&&i%3===2)return`<rect x="${x}" y="${y}" width="${bw}" height="${bh}" rx="1" fill="${colors[i]}" opacity="0.45"/>`;
    return`<rect x="${x}" y="${y}" width="${bw}" height="${bh}" rx="1" fill="${colors[i]}"/>`;
  }).join('');
  return`<svg class="ia-spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">${bars}</svg>`;
}

  if(body&&body.dataset.page==='item-analysis'){
    body.innerHTML=buildItemAnalysis();
    requestAnimationFrame(()=>initItemCharts());
  }
}

function iaFilteredItems(){
  let items=[...IA_ITEMS];
  if(iaSt.category!=='all')items=items.filter(it=>it.cat.toLowerCase()===iaSt.category.toLowerCase());
  if(iaSt.search.trim()){
    const q=iaSt.search.trim().toLowerCase();
    items=items.filter(it=>it.name.toLowerCase().includes(q)||it.cat.toLowerCase().includes(q));
  }
  const col=iaSt.sort.col,dir=iaSt.sort.dir;
  items.sort((a,b)=>{
    const av=a[col]??0,bv=b[col]??0;
    return dir==='desc'?(bv-av):(av-bv);
  });
  return items;
}

function iaSetRange(r){iaSt.range=r;iaSt.page=1;iaRenderPage()}
function iaSetCat(c){iaSt.category=c;iaSt.page=1;iaRenderPage()}
function iaSetOrderType(t){iaSt.orderType=t;iaSt.page=1;iaRenderPage()}
function iaDoSearch(v){iaSt.search=v;iaSt.page=1;
  const filtered=iaFilteredItems();
  const tbody=document.getElementById('ia-tbody');
  const info=document.getElementById('ia-page-info');
  const pbtns=document.getElementById('ia-page-btns');
  if(!tbody)return;
  const total=filtered.length;
  const start=(iaSt.page-1)*iaSt.perPage;
  const page=filtered.slice(start,start+iaSt.perPage);
  tbody.innerHTML=iaBuildRows(page,start);
  if(info)info.textContent=`Showing ${Math.min(start+1,total)}–${Math.min(start+iaSt.perPage,total)} of ${total} items`;
  if(pbtns)pbtns.innerHTML=iaBuildPageBtns(total);
}
function iaSort(col){
  if(iaSt.sort.col===col)iaSt.sort.dir=iaSt.sort.dir==='desc'?'asc':'desc';
  else{iaSt.sort.col=col;iaSt.sort.dir='desc'}
  iaSt.page=1;iaRenderPage();
}
function iaGoPage(n){iaSt.page=n;
  const filtered=iaFilteredItems();
  const tbody=document.getElementById('ia-tbody');
  const info=document.getElementById('ia-page-info');
  const pbtns=document.getElementById('ia-page-btns');
  if(!tbody)return;
  const total=filtered.length;
  const start=(n-1)*iaSt.perPage;
  const page=filtered.slice(start,start+iaSt.perPage);
  tbody.innerHTML=iaBuildRows(page,start);
  if(info)info.textContent=`Showing ${Math.min(start+1,total)}–${Math.min(start+iaSt.perPage,total)} of ${total} items`;
  if(pbtns)pbtns.innerHTML=iaBuildPageBtns(total);
}

function iaBuildPageBtns(total){
  const totalPages=Math.ceil(total/iaSt.perPage);
  let html=`<button class="ia-pg-btn" onclick="iaGoPage(${iaSt.page-1})" ${iaSt.page<=1?'disabled':''}>‹</button>`;
  for(let p=1;p<=totalPages;p++)html+=`<button class="ia-pg-btn${p===iaSt.page?' active':''}" onclick="iaGoPage(${p})">${p}</button>`;
  html+=`<button class="ia-pg-btn" onclick="iaGoPage(${iaSt.page+1})" ${iaSt.page>=totalPages?'disabled':''}>›</button>`;
  return html;
}

function iaSortIco(col){
  const isActive=iaSt.sort.col===col;
  const cls=isActive?` ${iaSt.sort.dir}`:'';
  return`<span class="ia-sort${cls}"><span class="ia-sa">▲</span><span class="ia-sd">▼</span></span>`;
}

function iaAvatar(item){
  if(item.img){
    return`<div class="ia-item-avatar"><img src="${item.img}" alt="${item.name}"></div>`;

  const bg=IA_CAT_COLORS[item.cat]||'#44505C';
  const initials=item.name.split(/\s+/).slice(0,2).map(w=>w[0].toUpperCase()).join('');
  return`<div class="ia-item-avatar" style="background:${bg}">${initials}</div>`;
}

function iaChgBadge(cur,prev,isRate){
  if(prev==null||prev===0)return'';
  const diff=isRate?(cur-prev):((cur-prev)/prev*100);
  const sign=diff>=0?'+':'';
  const label=isRate?`${sign}${diff.toFixed(1)}pp`:`${sign}${diff.toFixed(1)}%`;
  const cls=diff>0?'ia-chg-up':diff<0?'ia-chg-dn':'ia-chg-neu';
  const arrow=diff>0?'↑':diff<0?'↓':'→';
  return`<span class="ia-chg ${cls}">${arrow} ${label}</span>`;
}

function initItemCharts(){
  const barEl=document.getElementById('ia-chart-bar');
  if(barEl){
    const top8=[...IA_ITEMS].sort((a,b)=>b.orders-a.orders).slice(0,8);
    chartInstances['ia-chart-bar']=new Chart(barEl.getContext('2d'),{
      type:'bar',
      data:{
        labels:top8.map(it=>it.name.length>20?it.name.slice(0,20)+'…':it.name),
        datasets:[{
          data:top8.map(it=>it.orders),
          backgroundColor:top8.map((_,i)=>i===0?'#00342C':i<=2?'#008470':'#9DC9C3'),
          borderRadius:4,borderSkipped:false
        }]
      },
      options:{
        indexAxis:'y',responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:i=>`${i.raw.toLocaleString()} orders`}}},
        scales:{
          x:{grid:{color:'#F0F5F4'},ticks:{color:'#5C5E5E',font:{size:11}},min:0},
          y:{grid:{display:false},ticks:{color:'#282D33',font:{size:12}}}
        }
      }
    });
  }
  const donutEl=document.getElementById('ia-chart-donut');
  if(donutEl){
    chartInstances['ia-chart-donut']=new Chart(donutEl.getContext('2d'),{
      type:'doughnut',
      data:{datasets:[{data:[61,14,12,8,5],backgroundColor:['#336D65','#00E784','#9DC9C3','#334768','#C8CDD0'],borderWidth:2,borderColor:'#fff',hoverOffset:4}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{display:false},tooltip:{callbacks:{label:i=>`${['Mains','Beverages','Sides','Desserts','Salads'][i.dataIndex]}: ${i.raw}%`}}}}
    });

}

function iaExportCSV(){
  const header='"Item Name","Cat. Rank","Category","Orders","Orders Δ%","Revenue (AED)","Revenue Δ%","Exposure","Exposure Δ%","Add-to-Cart","ATC Δ%","ATC Rate (%)","ATC Rate Δpp","Status"';
  const items=iaFilteredItems();
  const pct=(cur,prev)=>prev?((cur-prev)/prev*100).toFixed(1):'';
  const pp=(cur,prev)=>prev!==undefined?(cur-prev).toFixed(1):'';
  const rows=items.map((it)=>{
    const st=iaGetStatus(it);
    return`"${it.name}","#${it.catRank}","${it.cat}","${it.orders}","${pct(it.orders,it.prevOrders)}","${it.rev}","${pct(it.rev,it.prevRev)}","${it.imp}","${pct(it.imp,it.prevImp)}","${it.atc}","${pct(it.atc,it.prevAtc)}","${it.rate}","${pp(it.rate,it.prevRate)}","${st.lbl}"`;
  });
  const csv=[header,...rows].join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='item_analysis.csv';
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
}

function rpBuildOutletSection(){
  const rp=rpSt.rpO;
  const allOutlets=SD.outlets;
  const selCnt=allOutlets.filter(o=>rp.outlets.has(o.id)).length;
  const totalCnt=allOutlets.length;
  const isAll=selCnt===totalCnt;
  const hasVal=selCnt>0;

  let triggerContent='';
  if(!hasVal){
    triggerContent=`<span class="rp-ms-ph">Search and select outlets…</span>`;
  } else if(isAll){
    triggerContent=`<div class="rp-ms-count"><svg width="14" height="14" viewBox="0 0 20 20" fill="none"><path d="M10 2C6.686 2 4 4.686 4 8c0 5 6 10 6 10s6-5 6-10c0-3.314-2.686-6-6-6z" stroke="#008470" stroke-width="1.5"/><circle cx="10" cy="8" r="2" stroke="#008470" stroke-width="1.5"/></svg><span>All outlets selected</span><span class="rp-ms-count-badge">${totalCnt}</span></div>`;
  } else {
    triggerContent=`<div class="rp-ms-count"><svg width="14" height="14" viewBox="0 0 20 20" fill="none"><path d="M10 2C6.686 2 4 4.686 4 8c0 5 6 10 6 10s6-5 6-10c0-3.314-2.686-6-6-6z" stroke="#008470" stroke-width="1.5"/><circle cx="10" cy="8" r="2" stroke="#008470" stroke-width="1.5"/></svg><span>${selCnt} outlet${selCnt!==1?'s':''} selected</span><span class="rp-ms-count-badge">${selCnt}</span></div>`;
  }

  let dropdown='';
  if(rpSt.outletOpen){
    const q=(rpSt.outletSearch||'').toLowerCase().trim();
    // Group outlets by brand, filter by search
    const brandMap={};
    allOutlets.forEach(o=>{
      if(q&&!o.name.toLowerCase().includes(q)&&!o.code.toLowerCase().includes(q)&&!o.area.toLowerCase().includes(q))return;
      if(!brandMap[o.brand])brandMap[o.brand]=[];
      brandMap[o.brand].push(o);
    });
    const matchedOutlets=Object.values(brandMap).flat();
    const allMatch=matchedOutlets.length>0&&matchedOutlets.every(o=>rp.outlets.has(o.id));
    const anyMatch=matchedOutlets.some(o=>rp.outlets.has(o.id));
    const allRow=`<div class="rp-ms-all-row" onclick="event.stopPropagation();rpMsTogAll()">
      <label class="au-chk" style="pointer-events:none">
        <input type="checkbox" ${allMatch?'checked':''} ${anyMatch&&!allMatch?'data-ind="1"':''}>

          <svg class="au-chk-mark" width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4.5L3.8 7.5L9.5 1.5" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <svg class="au-chk-ind" width="9" height="2" viewBox="0 0 9 2" fill="none"><path d="M0.5 1H8.5" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/></svg>
        </span>
      </label>
      <span class="rp-ms-all-lbl">${q?`Select all ${matchedOutlets.length} matching`:'Select all outlets'}</span>
    </div>`;
    const groups=matchedOutlets.length?Object.entries(brandMap).map(([brId,outlets])=>{
      const br=SD.brands.find(b=>b.id===brId);
      const rows=outlets.map(o=>`
        <div class="rp-ms-row" onclick="event.stopPropagation();rpTOu('${o.id}',${!rp.outlets.has(o.id)})">
          <label class="au-chk" style="pointer-events:none">
            <input type="checkbox" ${rp.outlets.has(o.id)?'checked':''}>
            <span class="au-chk-box"><svg class="au-chk-mark" width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4.5L3.8 7.5L9.5 1.5" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          </label>
          <div class="rp-ms-row-info">
            <div class="rp-ms-row-name">${o.name}</div>
            <div class="rp-ms-row-meta">${o.code} · ${o.area}</div>
          </div>

      return`<div class="rp-ms-group"><div class="rp-ms-grp-hdr">${br?br.name:brId}</div>${rows}</div>`;
    }).join(''):`<div class="rp-ms-empty">No outlets match "<strong>${q}</strong>"</div>`;
    dropdown=`<div class="rp-ms-dd" id="rp-ms-dd" onclick="event.stopPropagation()">
      <div class="rp-ms-search-wrap">
        <svg class="rp-ms-si" width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="4" stroke="currentColor" stroke-width="1.3"/><path d="M9.5 9.5L12 12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>

      </div>
      <div class="rp-ms-list">${allRow}${groups}</div>
      <div class="rp-ms-footer">
        <span class="rp-ms-footer-info">${selCnt} of ${totalCnt} selected</span>
        <div class="rp-ms-footer-acts">
          ${selCnt>0?`<button class="btn btn-tertiary btn-sm" onclick="rpMsClearAll()">Clear</button>`:''}
          <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();rpSt.outletOpen=false;rpRenderPage()">Done</button>
        </div>
      </div>

  }

  return`<div class="rp-section">

    <span class="rp-step-badge">2</span>
    <div>
      <div class="rp-field-lbl">Outlets</div>

    </div>
  </div>
  <div class="rp-ms-wrap" id="rp-ms-wrap">
    <div class="rp-ms-trigger${rpSt.outletOpen?' open':''}${hasVal?' has-val':''}" onclick="event.stopPropagation();rpTogOutletPanel()" id="rp-ms-trig">
      ${triggerContent}

    </div>

}

function rpMsTogAll(){
  const q=(rpSt.outletSearch||'').toLowerCase().trim();

const RP_MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const RP_DAYS=['Su','Mo','Tu','We','Th','Fr','Sa'];

function rpFmtDate(s){if(!s)return'';const[y,m,d]=s.split('-').map(Number);return`${d} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m-1]} ${y}`}
function rpDateStr(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}

function rpBuildPeriodSection(){

  else if(p.start&&p.end)disp=`${rpFmtDate(p.start)} – ${rpFmtDate(p.end)}`;

    </div>
  </div>

    <div class="rp-period-input${disp?' has-v':''}" onclick="rpTogPeriod()" style="max-width:420px">

        <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><rect x="2" y="3" width="12" height="11" rx="1.5" stroke="${col}" stroke-width="1.3"/><path d="M5 2V4M11 2V4" stroke="${col}" stroke-width="1.3" stroke-linecap="round"/><path d="M2 7h12" stroke="${col}" stroke-width="1.2"/></svg>
        ${disp?`<span style="font-weight:500;color:#282D33">${disp}</span>`:`<span class="rp-period-ph">Select a date range</span>`}
      </div>
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none" style="transition:transform .2s;${p.open?'transform:rotate(180deg)':''}"><path d="M2 4L6.5 9L11 4" stroke="${col}" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    ${p.open?rpBuildCalendar():''}
  </div>
</div>`;
}

function rpBuildCalendar(){
  const{ly,lm}=rpSt.period;
  const rm=(lm+1)%12,ry=lm===11?ly+1:ly;
  const quicks=[{k:'last7',l:'Last 7 days'},{k:'last30',l:'Last 30 days'},{k:'last3m',l:'Last 3 months'},{k:'last6m',l:'Last 6 months'},{k:'last12m',l:'Last 12 months'},{k:'custom',l:'Custom range'}];
  return`<div class="rp-period-dd" id="rp-period-dd">
  <div class="rp-quick-list">
    ${quicks.map(q=>`<div class="rp-quick-item${rpSt.period.quick===q.k?' active':''}" onclick="rpSetQuick('${q.k}')">${q.l}</div>`).join('')}
  </div>
  <div class="rp-cals">
    <div class="rp-cal">
      <div class="rp-cal-nav-row">
        <button class="rp-cal-btn" onclick="rpCalPrev()"><svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M8 10L4 6.5L8 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <span class="rp-cal-lbl">${RP_MONTHS[lm]} ${ly}</span>
        <span style="width:28px"></span>
      </div>
      <div class="rp-cal-grid">${RP_DAYS.map(d=>`<div class="rp-cal-dh">${d}</div>`).join('')}${rpCalDays(ly,lm)}</div>
    </div>
    <div class="rp-cal" style="border-left:1px solid #F0F5F4;padding-left:16px">
      <div class="rp-cal-nav-row">
        <span style="width:28px"></span>
        <span class="rp-cal-lbl">${RP_MONTHS[rm]} ${ry}</span>
        <button class="rp-cal-btn" onclick="rpCalNext()"><svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M5 3L9 6.5L5 10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      </div>
      <div class="rp-cal-grid">${RP_DAYS.map(d=>`<div class="rp-cal-dh">${d}</div>`).join('')}${rpCalDays(ry,rm)}</div>
    </div>
  </div>
</div>`;
}

function rpCalDays(yr,mo){
  const{start,end,hov}=rpSt.period;
  const first=new Date(yr,mo,1).getDay();
  const dim=new Date(yr,mo+1,0).getDate();
  const today=new Date();
  let h='';
  for(let i=0;i<first;i++)h+=`<div class="rp-cal-d empty"></div>`;
  for(let d=1;d<=dim;d++){
    const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isFuture=new Date(yr,mo,d)>today;
    const isToday=(yr===today.getFullYear()&&mo===today.getMonth()&&d===today.getDate());
    if(isFuture){h+=`<div class="rp-cal-d dis">${d}</div>`;continue}
    const rangeEnd=end||hov;
    const isRS=ds===start,isRE=ds===end||(ds===hov&&!end&&hov>start);
    const inR=start&&rangeEnd&&ds>start&&ds<rangeEnd;
    let cls='rp-cal-d';
    if(isRS&&isRE)cls+=' rs re';
    else if(isRS)cls+=' rs';
    else if(isRE)cls+=' re';
    else if(inR)cls+=' ir';
    const dot=isToday?`<span class="rp-cal-today-dot"></span>`:'';
    h+=`<div class="${cls}" data-date="${ds}" onclick="rpCalClick('${ds}')" onmouseenter="rpCalHov('${ds}')">${d}${dot}</div>`;
  }
  return h;
}

function rpTogPeriod(){rpSt.period.open=!rpSt.period.open;rpRenderPage()}
function rpPeriodOutside(e){if(rpSt&&rpSt.period.open){rpSt.period.open=false;rpRenderPage()}}
function rpCalPrev(){let{ly,lm}=rpSt.period;lm--;if(lm<0){lm=11;ly--}rpSt.period.ly=ly;rpSt.period.lm=lm;rpRenderPage()}
function rpCalNext(){let{ly,lm}=rpSt.period;lm++;if(lm>11){lm=0;ly++}rpSt.period.ly=ly;rpSt.period.lm=lm;rpRenderPage()}

function rpCalClick(ds){
  const p=rpSt.period;
  if(!p.start||(p.start&&p.end)){p.start=ds;p.end=null;p.quick='custom'}
  else if(ds===p.start){return}
  else if(ds<p.start){p.end=p.start;p.start=ds;p.quick='custom'}
  else{p.end=ds;p.quick='custom';p.open=false}
  p.hov=null;rpRenderPage();
}

function rpCalHov(ds){
  const p=rpSt.period;
  if(!p.start||p.end)return;
  if(ds===p.hov)return;
  p.hov=ds;
  document.querySelectorAll('.rp-cal-d[data-date]').forEach(el=>{
    const d=el.dataset.date;
    const rangeEnd=ds;
    const isRS=d===p.start,isRE=d===ds&&ds>p.start;
    const inR=d>p.start&&d<rangeEnd;
    el.classList.remove('rs','re','ir');
    if(isRS&&isRE)el.classList.add('rs','re');
    else if(isRS)el.classList.add('rs');
    else if(isRE)el.classList.add('re');
    else if(inR)el.classList.add('ir');
  });
}

function rpSetQuick(k){
  const p=rpSt.period;
  p.quick=k;
  const t=new Date();
  const s=(d)=>rpDateStr(d);
  const shift=(n)=>{const d=new Date(t);d.setDate(d.getDate()+n);return d};
  const shiftM=(n)=>{const d=new Date(t);d.setMonth(d.getMonth()+n);return d};
  if(k==='last7'){p.start=s(shift(-7));p.end=s(shift(-1));p.open=false}
  else if(k==='last30'){p.start=s(shift(-30));p.end=s(shift(-1));p.open=false}
  else if(k==='last3m'){p.start=s(shiftM(-3));p.end=s(shift(-1));p.open=false}
  else if(k==='last6m'){p.start=s(shiftM(-6));p.end=s(shift(-1));p.open=false}
  else if(k==='last12m'){p.start=s(shiftM(-12));p.end=s(shift(-1));p.open=false}
  else{p.start=null;p.end=null}
  p.hov=null;rpRenderPage();
}

// ── Submit ───────────────────────────────────────────
function rpSubmit(){
  rpEnsureInit();
  const avO=SD.outlets.filter(o=>rpSt.rpO.outlets.has(o.id));
  if(!avO.length){rpToast('Please select at least one outlet','err');return}
  if(!rpSt.period.start){rpToast('Please select a report period','err');return}
  const list=RP_METRICS[rpSt.subtype];
  const sub=RP_DEF[rpSt.type].subtypes.find(s=>s.id===rpSt.subtype);
  if(list&&rpSt.metrics.size===0){rpToast('Please select at least one metric','err');return}
  if(sub&&sub.soon){rpToast('This report type is coming soon','err');return}

  const def=RP_DEF[rpSt.type];
  const outLbl=avO.length===1?avO[0].name:`${avO.length} outlets`;
  const perLbl=rpFmtDate(rpSt.period.start)+(rpSt.period.end?` – ${rpFmtDate(rpSt.period.end)}`:'');
  const fmts=sub.badge==='PDF'?['pdf']:['csv','xlsx'];
  const now=new Date();
  const nowStr=`${now.getDate()} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][now.getMonth()]} ${now.getFullYear()}, ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  const rec={id:Date.now(),name:`${outLbl} — ${sub.name}`,type:def.label,sub:sub.name,period:perLbl,outlets:outLbl,generated:'Generating…',status:'processing',fmts};
  rpSt.records.unshift(rec);
  rpSt.tab='records';
  rpRenderPage();
  rpToast('Report generation started. Check Download records for progress.');

  setTimeout(()=>{
    const r=rpSt.records.find(r=>r.id===rec.id);
    if(r){r.status='ready';r.generated=nowStr;if(activePath==='/analytics/reports')rpRenderPage()}
  },2200);
}

// ── Download ─────────────────────────────────────────
function rpDownload(id,fmt){
  const rec=rpSt.records.find(r=>r.id===id);
  if(!rec)return;
  let content,mime,fname;
  const safe=rec.name.replace(/[^a-z0-9]/gi,'_');
  if(fmt==='pdf'){
    content=`%PDF-1.4 (mock)\nReport: ${rec.name}\nType: ${rec.type} — ${rec.sub}\nPeriod: ${rec.period}\nOutlets: ${rec.outlets}\nGenerated: ${rec.generated}\n\nThis is a mock PDF generated for prototype purposes.`;
    mime='application/pdf';fname=`${safe}.pdf`;
  }else if(fmt==='xlsx'){
    content=`Report\t${rec.name}\nType\t${rec.type}\nSubtype\t${rec.sub}\nPeriod\t${rec.period}\nOutlets\t${rec.outlets}\nGenerated\t${rec.generated}`;
    mime='application/vnd.openxmlformats-officedocument.spreadsheetml.sheet';fname=`${safe}.xlsx`;
  }else{
    content=`"Report Name","Type","Subtype","Period","Outlets","Generated"\n"${rec.name}","${rec.type}","${rec.sub}","${rec.period}","${rec.outlets}","${rec.generated}"`;
    mime='text/csv';fname=`${safe}.csv`;
  }
  const blob=new Blob([content],{type:mime});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=fname;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
  rpToast(`Downloading ${fname}`);
}

// ── Toast ────────────────────────────────────────────
function rpToast(msg,type='ok'){
  const ex=document.getElementById('rp-toast-el');if(ex)ex.remove();
  const t=document.createElement('div');
  t.id='rp-toast-el';t.className='rp-toast'+(type==='err'?' rp-toast-err':'');
  t.innerHTML=`<span>${msg}</span><button class="rp-toast-close" onclick="this.parentElement.remove()">×</button>`;
  document.body.appendChild(t);
  setTimeout(()=>{if(t.parentElement)t.remove()},4000);
}

// ── Helpers ──────────────────────────────────────────
function diChg(cur,prev){return prev?((cur-prev)/Math.abs(prev)*100):0}
function diAed(n){return`AED ${Number(n).toLocaleString('en')}`}
function diAedK(n){return n>=10000?`AED ${(n/1000).toFixed(0)}k`:`AED ${Number(n).toLocaleString('en')}`}
function diNum(n){return n>=1000?`${(n/1000).toFixed(1)}k`:String(n)}
function diSign(n){return n>0?'+':''}
function diPrdLabel(k){const m={yesterday:'vs prior day',today:'vs same time yesterday',thisweek:'vs same period last week',lastweek:'vs week before',thismonth:'vs same period last month',lastmonth:'vs month before'};return m[k]||'vs prior period'}
function diBadge(chg,invert){
  const good=invert?(chg<=0):(chg>=0);
  const cls=Math.abs(chg)<0.1?'di-badge-info':good?'di-badge-up':'di-badge-dn';
  const arrow=chg>0.1?'↑':chg<-0.1?'↓':'→';
  return`<span class="di-badge ${cls}">${arrow} ${Math.abs(chg).toFixed(1)}%</span>`;
}
function diTxt(cur,prev,invert){
  const c=diChg(cur,prev);
  const abs=Math.abs(c).toFixed(0);
  const isGood=invert?(c<=0):(c>=0);
  const col=Math.abs(c)<0.5?'#7E8080':isGood?'#008470':'#B81919';
  const label=Math.abs(c)<0.5?'flat':`${c>0?'up':'down'} ${abs}%`;
  return`<span style="color:${col};font-weight:600">${label}</span>`;
}

// Compare dropdown — chart comparison logic
function cmpShift(data){const s=Math.ceil(data.length/3);return[...data.slice(s),...data.slice(0,s)]}
function cmpAddToChart(chart,label){
  if(chart.config.type!=='line')return;
  chart.data.datasets=chart.data.datasets.filter(d=>!d._cmp);
  const p=chart.data.datasets[0];if(!p||!p.data)return;
  chart.data.datasets.unshift({label,data:cmpShift([...p.data]),borderColor:'#9DC9C3',borderWidth:1.5,borderDash:[5,4],backgroundColor:'transparent',pointRadius:0,pointHoverRadius:4,pointBorderColor:'#9DC9C3',fill:false,tension:0.4,_cmp:true});
  chart.update('none');
}
function cmpRemoveFromChart(chart){
  const n=chart.data.datasets.length;
  chart.data.datasets=chart.data.datasets.filter(d=>!d._cmp);
  if(chart.data.datasets.length!==n)chart.update('none');
}
function cmpToggle(trigger){
  const wrap=trigger.closest('.cmp-wrap');
  const isOpen=wrap.classList.contains('open');
  document.querySelectorAll('.cmp-wrap.open').forEach(w=>w.classList.remove('open'));
  if(!isOpen){
    // Sync radio selection with current label before opening
    const curLabel=wrap.querySelector('.cmp-label').textContent.replace('Compare to: ','');
    wrap.querySelectorAll('.cmp-item').forEach(i=>{
      const match=curLabel==='None'?i.dataset.label==='':i.dataset.label===curLabel;
      i.classList.toggle('selected',match);
    });
    wrap.classList.add('open');
  }
}
function cmpSelect(item){item.closest('.cmp-menu').querySelectorAll('.cmp-item').forEach(i=>i.classList.remove('selected'));item.classList.add('selected')}
function cmpReset(btn){
  const wrap=btn.closest('.cmp-wrap');
  wrap.querySelectorAll('.cmp-item').forEach(i=>i.classList.remove('selected'));
  const noneItem=wrap.querySelector('.cmp-item[data-label=""]');if(noneItem)noneItem.classList.add('selected');
  wrap.querySelector('.cmp-label').textContent='Compare to: None';
  wrap.classList.remove('open');
  const footer=wrap.closest('.sp-chart-footer');
  const section=footer&&footer.parentElement;
  if(section){
    section.querySelectorAll('canvas').forEach(c=>{const ch=chartInstances[c.id];if(ch)cmpRemoveFromChart(ch)});
    const cl=footer.querySelector('.sp-legend-item-cmp');if(cl)cl.remove();
    const cp=section.closest('.sp-page')?.querySelector('.sp-compared')||section.querySelector('.sp-compared');if(cp)cp.innerHTML='Data shown for: 22 Apr – 28 Apr';
  }
}
function cmpApply(btn){
  const wrap=btn.closest('.cmp-wrap');
  const sel=wrap.querySelector('.cmp-item.selected');
  const label=sel?sel.dataset.label:null;
  wrap.querySelector('.cmp-label').textContent=label?'Compare to: '+label:'Compare to: None';
  wrap.classList.remove('open');
  const footer=wrap.closest('.sp-chart-footer');
  const section=footer&&footer.parentElement;
  if(!section)return;
  // Update all line charts in the section
  section.querySelectorAll('canvas').forEach(c=>{
    const ch=chartInstances[c.id];
    if(ch){label?cmpAddToChart(ch,label):cmpRemoveFromChart(ch)}
  });
  // Update legend
  const oldCl=footer.querySelector('.sp-legend-item-cmp');if(oldCl)oldCl.remove();
  if(label){
    const legGroup=footer.querySelector('.sp-legend-right');
    if(legGroup){
      const cmpItem=document.createElement('div');
      cmpItem.className='sp-legend-item sp-legend-item-cmp';
      cmpItem.innerHTML=`<div class="sp-legend-dash"></div>${label}`;
      legGroup.insertBefore(cmpItem,legGroup.firstChild);
    }
  }
  // Update sp-compared header text
  const cp=section.closest('.sp-page')?.querySelector('.sp-compared')||section.querySelector('.sp-compared');
  if(cp)cp.innerHTML=label?'Data shown for: 22 Apr – 28 Apr &nbsp;·&nbsp; Comparison period: 15 Apr – 21 Apr':'Data shown for: 22 Apr – 28 Apr';
}

<script>
const OB_TRENDS={'kfc-marina':'+8%','kfc-jbr':'+12%','kfc-difc':'-3%','kfc-yas':'+5%','kfc-shj':'-7%','ph-marina':'+2%','ph-moe':'+15%','hrd-jbr':'+9%','herfy-d':'+1%','pop-dm':'+22%','pop-ad':'+6%'};
function obFmtN(n){if(n>=10000)return(n/1000).toFixed(0)+'k';if(n>=1000)return(n/1000).toFixed(1)+'k';return n.toLocaleString()}
function obOpenModal(){
  const rows=SD.outlets.map(o=>({...o,...(OSS_METRICS[o.id]||{orders:50,gross:500,contrib:3})}));
  rows.sort((a,b)=>b.orders-a.orders);
  const totOrd=rows.reduce((s,r)=>s+r.orders,0);
  const totGross=rows.reduce((s,r)=>s+r.gross,0);
  const maxContrib=Math.max(...rows.map(r=>r.contrib));
  // Summary bar
  document.getElementById('ob-msummary').innerHTML=`
    <div class="ob-mstat"><span class="ob-mstat-v">${rows.length}</span><span class="ob-mstat-l">Outlets</span></div>
    <div class="ob-mstat"><span class="ob-mstat-v">${obFmtN(totOrd)}</span><span class="ob-mstat-l">Total orders</span></div>
    <div class="ob-mstat"><span class="ob-mstat-v">AED ${obFmtN(totGross)}</span><span class="ob-mstat-l">Total gross sales</span></div>
    <div class="ob-mstat"><span class="ob-mstat-v">AED ${Math.round(totGross/totOrd)}</span><span class="ob-mstat-l">Avg order value</span></div>`;
  // Table rows
  document.getElementById('ob-tbody').innerHTML=rows.map((o,i)=>{
    const avg=Math.round(o.gross/o.orders);
    const tr=OB_TRENDS[o.id]||'+0%';
    const isUp=tr.startsWith('+');
    const barW=Math.round((o.contrib/maxContrib)*100);
    return`<tr>
      <td class="ob-mtd" style="text-align:left">
        <div class="ob-mnm">${o.name}</div>
        <div class="ob-msub">${o.code} · ${o.area}</div>
      </td>
      <td class="ob-mtd" style="font-weight:600">${o.orders.toLocaleString()}</td>
      <td class="ob-mtd" style="font-weight:600">${o.gross.toLocaleString()}</td>
      <td class="ob-mtd">${avg}</td>
      <td class="ob-mtd">
        <div style="display:flex;align-items:center;justify-content:flex-end;gap:6px">
          <div class="ob-bar-bg"><div class="ob-bar-fg" style="width:${barW}%"></div></div>
          <span style="font-weight:600;min-width:28px;text-align:right">${o.contrib}%</span>
        </div>
      </td>
      <td class="ob-mtd"><span class="sp-tag ${isUp?'up':'down'}" style="font-size:11px;padding:3px 6px">${isUp?'↑':'↓'} ${tr.replace(/[+-]/,'')}</span></td>
    </tr>`;
  }).join('');
  document.getElementById('ob-mfoot-lbl').textContent=`${rows.length} outlets · Updated as of 16:00`;
  document.getElementById('ob-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function obCloseModal(){
  document.getElementById('ob-overlay').classList.remove('open');
  document.body.style.overflow='';
}
function obBgClick(e){if(e.target===document.getElementById('ob-overlay'))obCloseModal()}
function obExport(){console.log('Export outlets')}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(document.getElementById('oh-overlay')?.classList.contains('open'))ohCloseModal();
    else obCloseModal();
  }
});
</script>

<div class="oh-overlay" id="oh-overlay" onclick="ohBgClick(event)">
  <div class="oh-modal" id="oh-modal">
    <div class="oh-mhdr">
      <div>
        <div class="oh-mtitle">Operating hours</div>
        <div class="oh-msub">Set when your outlet accepts orders on Careem</div>
      </div>
      <button class="oh-mclose" onclick="ohCloseModal()" aria-label="Close">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="oh-outlet-bar" id="oh-outlet-bar"></div>
    <div class="oh-mbody" id="oh-mbody"></div>
    <div class="oh-mfoot">
      <span class="oh-mfoot-note">Changes will apply to the selected outlet immediately after saving.</span>
      <div class="oh-mfoot-actions">
        <button class="oh-cancel-btn" onclick="ohCloseModal()">Cancel</button>
        <button class="oh-save-btn" onclick="ohSave()">Save changes</button>
      </div>
    </div>
  </div>
</div>
<div class="oh-toast" id="oh-toast"></div>
<script>
const OH_DEFAULTS=[
  {day:'Mon',open:true, slots:[{from:'09:00',to:'22:00'}]},
  {day:'Tue',open:true, slots:[{from:'09:00',to:'22:00'}]},
  {day:'Wed',open:true, slots:[{from:'09:00',to:'22:00'}]},
  {day:'Thu',open:true, slots:[{from:'09:00',to:'23:00'}]},
  {day:'Fri',open:true, slots:[{from:'10:00',to:'23:00'}]},
  {day:'Sat',open:true, slots:[{from:'10:00',to:'23:00'}]},
  {day:'Sun',open:false,slots:[{from:'10:00',to:'22:00'}]},
];
let ohState=null;         // active day-states array for current outlet
let ohOutletId=null;      // id of the outlet currently being edited
let ohOutletStates={};    // persists states per outlet across switches
let ohDdOpen=false;       // outlet dropdown open flag
function ohClone(d){return JSON.parse(JSON.stringify(d))}

// Return currently selected outlets, with a graceful fallback
function ohGetOutlets(){
  try{if(typeof SD!=='undefined'&&SD.outlets&&SD.outlets.length)return SD.outlets}catch(e){}
  return[
    {id:'kfc-jbr',   name:'KFC JBR',          code:'KFC-001',area:'JBR'},
    {id:'kfc-marina',name:'KFC Marina',        code:'KFC-002',area:'Marina'},
    {id:'ph-marina', name:'Pizza Hut Marina',  code:'PH-001', area:'Marina'},
  ];
}

function ohOpenModal(){
  const outlets=ohGetOutlets();
  ohOutletId=outlets[0].id;
  ohOutletStates={};
  ohState=ohClone(OH_DEFAULTS);
  ohOutletStates[ohOutletId]=ohClone(ohState);
  ohRenderOutletBar();
  ohRender();
  document.getElementById('oh-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function ohCloseModal(){
  ohCloseDd();
  document.getElementById('oh-overlay').classList.remove('open');
  document.body.style.overflow='';
  ohState=null;ohOutletId=null;ohOutletStates={};
}
function ohBgClick(e){if(e.target===document.getElementById('oh-overlay'))ohCloseModal()}

/* ---- Outlet bar ---- */
function ohRenderOutletBar(){
  const bar=document.getElementById('oh-outlet-bar');
  if(!bar)return;
  const outlets=ohGetOutlets();
  const cur=outlets.find(o=>o.id===ohOutletId)||outlets[0];
  const chev=`<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 4.5l3 3 3-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  if(outlets.length===1){
    bar.innerHTML=`<span class="oh-outlet-lbl">Outlet:</span><span style="font-size:13px;font-weight:600;color:#202121">${cur.name}</span><span style="font-size:11px;color:#8A9099">${cur.code} · ${cur.area}</span>`;
    return;
  }
  bar.innerHTML=`
    <span class="oh-outlet-lbl">Outlet:</span>
    <div class="oh-outlet-sel" id="oh-outlet-sel">
      <button class="oh-outlet-btn" id="oh-outlet-btn" onclick="ohToggleDd(event)">
        <span>${cur.name}</span>
        <span style="font-size:11px;color:#8A9099;font-weight:400">${cur.code}</span>
        ${chev}
      </button>
      <div class="oh-outlet-dd" id="oh-outlet-dd">
        ${outlets.map(o=>`
          <div class="oh-outlet-opt${o.id===ohOutletId?' active':''}" onclick="ohSwitchOutlet('${o.id}')">
            <div class="oh-outlet-opt-nm">${o.name}</div>
            <div class="oh-outlet-opt-sub">${o.code} · ${o.area}</div>
          </div>`).join('')}
      </div>
    </div>`;
}
function ohToggleDd(e){
  e.stopPropagation();
  ohDdOpen=!ohDdOpen;
  document.getElementById('oh-outlet-dd')?.classList.toggle('open',ohDdOpen);
  document.getElementById('oh-outlet-btn')?.classList.toggle('open',ohDdOpen);
}
function ohCloseDd(){
  ohDdOpen=false;
  document.getElementById('oh-outlet-dd')?.classList.remove('open');
  document.getElementById('oh-outlet-btn')?.classList.remove('open');
}
function ohSwitchOutlet(id){
  if(!ohState||id===ohOutletId)return;
  ohSyncInputs(); // flush any live input values before storing
  ohOutletStates[ohOutletId]=ohClone(ohState);
  ohOutletId=id;
  if(!ohOutletStates[id])ohOutletStates[id]=ohClone(OH_DEFAULTS);
  ohState=ohClone(ohOutletStates[id]);
  ohCloseDd();
  ohRenderOutletBar();
  ohRender();
}
// Flush current DOM input values to state (safety before outlet switch)
function ohSyncInputs(){
  if(!ohState)return;
  ohState.forEach((d,di)=>{
    if(!d.open)return;
    d.slots.forEach((s,si)=>{
      const els=document.querySelectorAll(`#oh-row-${di} .oh-slot`)[si]?.querySelectorAll('.oh-time-inp');
      if(els&&els[0])s.from=els[0].value;
      if(els&&els[1])s.to=els[1].value;
    });
  });
}

/* ---- Day list ---- */
function ohRender(){
  const body=document.getElementById('oh-mbody');
  if(!body||!ohState)return;
  const plusIco=`<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M6 2v8M2 6h8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>`;
  const minusIco=`<svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 6h8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>`;
  body.innerHTML=ohState.map((d,di)=>`
    <div class="oh-day-row" id="oh-row-${di}">
      <div class="oh-toggle-wrap">
        <label class="oh-toggle">
          <input type="checkbox" ${d.open?'checked':''} onchange="ohToggleDay(${di},this.checked)">
          <div class="oh-toggle-track"></div>
          <div class="oh-toggle-thumb"></div>
        </label>
      </div>
      <div class="oh-day-name">${d.day}</div>
      <div class="oh-day-slots">
        ${d.open
          ? d.slots.map((s,si)=>`
            <div class="oh-slot">
              <input class="oh-time-inp" type="time" value="${s.from}" onchange="ohSlotChange(${di},${si},'from',this.value)">
              <span class="oh-time-sep">–</span>
              <input class="oh-time-inp" type="time" value="${s.to}" onchange="ohSlotChange(${di},${si},'to',this.value)">
              ${d.slots.length>1?`<button class="oh-remove-slot-btn" onclick="ohRemoveSlot(${di},${si})" title="Remove slot">${minusIco}</button>`:'<span style="width:26px"></span>'}
            </div>`).join('')
          +`<button class="oh-add-slot-btn" onclick="ohAddSlot(${di})">${plusIco} Add time slot</button>`
          :`<span class="oh-closed-lbl">Closed all day</span>`
        }
      </div>
      ${d.open?`<button class="oh-copy-btn" onclick="ohCopyToAll(${di})" title="Copy to all open days"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M5.5 10.5H3A1.5 1.5 0 0 1 1.5 9V3A1.5 1.5 0 0 1 3 1.5H9A1.5 1.5 0 0 1 10.5 3V5.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><rect x="5.5" y="5.5" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.3"/></svg>Copy to all</button>`:''}
    </div>`).join('');
}

function ohToggleDay(di,val){
  if(!ohState)return;
  ohState[di].open=val;
  ohRender();
}
function ohSlotChange(di,si,key,val){
  if(!ohState)return;
  ohState[di].slots[si][key]=val;
}
function ohAddSlot(di){
  if(!ohState)return;
  const last=ohState[di].slots[ohState[di].slots.length-1];
  const[h]=last.to.split(':').map(Number);
  ohState[di].slots.push({from:last.to,to:`${String(Math.min(h+2,23)).padStart(2,'0')}:00`});
  ohRender();
  setTimeout(()=>{
    const rows=document.querySelectorAll(`#oh-row-${di} .oh-slot`);
    if(rows.length){const inp=rows[rows.length-1].querySelector('.oh-time-inp');if(inp)inp.focus()}
  },30);
}
function ohRemoveSlot(di,si){
  if(!ohState)return;
  ohState[di].slots.splice(si,1);
  ohRender();
}
function ohCopyToAll(di){
  if(!ohState)return;
  ohSyncInputs();
  const src=ohClone(ohState[di].slots);
  ohState.forEach((d,i)=>{if(i!==di&&d.open)d.slots=ohClone(src)});
  ohRender();
  ohState.forEach((_,i)=>{
    if(i!==di&&ohState[i].open){
      const row=document.getElementById(`oh-row-${i}`);
      if(!row)return;
      row.style.background='#EDF7F5';
      setTimeout(()=>row.style.background='',750);
    }
  });
}
function ohSave(){
  ohSyncInputs();
  // Commit current outlet state before closing
  if(ohOutletId)ohOutletStates[ohOutletId]=ohClone(ohState);
  ohCloseModal();
  const t=document.getElementById('oh-toast');
  if(!t)return;
  t.textContent='✓  Operating hours saved';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
// Close outlet dropdown on outside click
document.addEventListener('click',e=>{
  if(ohDdOpen&&!e.target.closest('#oh-outlet-sel'))ohCloseDd();
});
</script>
<!-- Date range picker overlay (reuses rp-cal-* styles) -->
<div id="dr-cal-dd" style="display:none;position:fixed;z-index:500;background:#fff;border:1.5px solid #E0E3E3;border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,.14);overflow:hidden">
  <div class="rp-cals" id="dr-cals"></div>
</div>
<script>
let drSt=null;
function drEnsureInit(){
  if(drSt)return;
  const n=new Date();
  let ly=n.getFullYear(),lm=n.getMonth()-1;
  if(lm<0){lm=11;ly--}
  drSt={open:false,start:null,end:null,hov:null,ly,lm,anchor:null};
}
function drCalDays(yr,mo){
  const{start,end,hov}=drSt;
  const first=new Date(yr,mo,1).getDay();
  const dim=new Date(yr,mo+1,0).getDate();
  const today=new Date();
  let h='';
  for(let i=0;i<first;i++)h+=`<div class="rp-cal-d empty"></div>`;
  for(let d=1;d<=dim;d++){
    const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isFuture=new Date(yr,mo,d)>today;
    const isToday=(yr===today.getFullYear()&&mo===today.getMonth()&&d===today.getDate());
    if(isFuture){h+=`<div class="rp-cal-d dis">${d}</div>`;continue}
    const rangeEnd=end||hov;
    const isRS=ds===start,isRE=ds===end||(ds===hov&&!end&&hov>start);
    const inR=start&&rangeEnd&&ds>start&&ds<rangeEnd;
    let cls='rp-cal-d';
    if(isRS&&isRE)cls+=' rs re';else if(isRS)cls+=' rs';else if(isRE)cls+=' re';else if(inR)cls+=' ir';
    const dot=isToday?`<span class="rp-cal-today-dot"></span>`:'';
    h+=`<div class="${cls}" data-date="${ds}" onclick="drCalClick('${ds}')" onmouseenter="drCalHov('${ds}')">${d}${dot}</div>`;
  }
  return h;
}
function drRenderCal(){
  const cals=document.getElementById('dr-cals');if(!cals)return;
  let{ly,lm}=drSt;let ry=ly,rm=lm+1;
  if(rm>11){rm=0;ry++}
  const chevL=`<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M8 10L4 6.5L8 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const chevR=`<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M5 3L9 6.5L5 10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  cals.innerHTML=`
    <div class="rp-cal">
      <div class="rp-cal-nav-row">
        <button class="rp-cal-btn" onclick="drCalPrev()">${chevL}</button>
        <span class="rp-cal-lbl">${RP_MONTHS[lm]} ${ly}</span>
        <span style="width:30px"></span>
      </div>
      <div class="rp-cal-grid">${RP_DAYS.map(d=>`<div class="rp-cal-dh">${d}</div>`).join('')}${drCalDays(ly,lm)}</div>
    </div>
    <div class="rp-cal" style="border-left:1px solid #F0F5F4;padding-left:16px">
      <div class="rp-cal-nav-row">
        <span style="width:30px"></span>
        <span class="rp-cal-lbl">${RP_MONTHS[rm]} ${ry}</span>
        <button class="rp-cal-btn" onclick="drCalNext()">${chevR}</button>
      </div>
      <div class="rp-cal-grid">${RP_DAYS.map(d=>`<div class="rp-cal-dh">${d}</div>`).join('')}${drCalDays(ry,rm)}</div>
    </div>`;
}
function drOpen(el){
  drEnsureInit();
  // Close if same anchor already open
  if(drSt.open&&drSt.anchor===el){drClose();return}
  drSt.anchor=el;drSt.open=true;
  el.classList.add('open');
  const dd=document.getElementById('dr-cal-dd');if(!dd)return;
  drRenderCal();
  dd.style.display='block';
  const rect=el.getBoundingClientRect();
  dd.style.top=(rect.bottom+6)+'px';
  dd.style.left=rect.left+'px';
  setTimeout(()=>{
    const r=dd.getBoundingClientRect();
    if(r.right>window.innerWidth-12)dd.style.left=(window.innerWidth-r.width-12)+'px';
  },0);
}
function drClose(){
  if(!drSt)return;
  if(drSt.anchor){drSt.anchor.classList.remove('open')}
  drSt.open=false;drSt.hov=null;
  const dd=document.getElementById('dr-cal-dd');
  if(dd)dd.style.display='none';
}
function drCalPrev(){let{ly,lm}=drSt;lm--;if(lm<0){lm=11;ly--}drSt.ly=ly;drSt.lm=lm;drRenderCal()}
function drCalNext(){let{ly,lm}=drSt;lm++;if(lm>11){lm=0;ly++}drSt.ly=ly;drSt.lm=lm;drRenderCal()}
function drCalClick(ds){
  if(!drSt.start||(drSt.start&&drSt.end)){drSt.start=ds;drSt.end=null}
  else if(ds===drSt.start){return}
  else if(ds<drSt.start){drSt.end=drSt.start;drSt.start=ds;drApply();return}
  else{drSt.end=ds;drApply();return}
  drSt.hov=null;drRenderCal();
}
function drCalHov(ds){
  if(!drSt.start||drSt.end)return;
  if(ds===drSt.hov)return;
  drSt.hov=ds;
  document.querySelectorAll('#dr-cals .rp-cal-d[data-date]').forEach(el=>{
    const d=el.dataset.date;
    el.classList.remove('rs','re','ir');
    const isRS=d===drSt.start,isRE=d===ds&&ds>drSt.start,inR=d>drSt.start&&d<ds;
    if(isRS&&isRE){el.classList.add('rs');el.classList.add('re')}
    else if(isRS)el.classList.add('rs');
    else if(isRE)el.classList.add('re');
    else if(inR)el.classList.add('ir');
  });
}
function drFmt(ds){const[,m,d]=ds.split('-');return`${parseInt(d)} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(m)-1]}`}
function drApply(){
  if(!drSt||!drSt.start)return;
  const a=drSt.anchor;
  if(a){
    const texts=a.querySelectorAll('.dr-input-text');
    if(texts[0])texts[0].textContent=drFmt(drSt.start);
    if(texts[1])texts[1].textContent=drSt.end?drFmt(drSt.end):'...';
    const row=a.closest('.sp-range');
    if(row)row.querySelectorAll('.sp-range-item').forEach(i=>i.classList.remove('active'));
    a.classList.add('active');
  }
  drClose();
}
// Close on outside click
document.addEventListener('click',e=>{
  if(drSt&&drSt.open&&!e.target.closest('#dr-cal-dd')&&!e.target.closest('.dr-input'))drClose();
});
</script>
</body>
</html>
